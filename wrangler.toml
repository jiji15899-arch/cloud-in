name = "cloudpress"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "cloudpress-db"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
SITE_DOMAIN        = "cloudpress.site"
ADMIN_EMAIL        = "choichoi3227@gmail.com"
CF_API_TOKEN       = ""
CF_ZONE_ID         = ""
CF_ACCOUNT_ID      = ""
PROVISIONER_URL    = "http://YOUR_ORACLE_VPS_IP:3721"
PROVISIONER_SECRET = "CHANGE_THIS_RANDOM_SECRET"
TOSS_CLIENT_KEY    = "test_ck_YOUR_TOSS_CLIENT_KEY"
TOSS_SECRET_KEY    = "test_sk_YOUR_TOSS_SECRET_KEY"
JWT_SECRET         = "CHANGE_THIS_RANDOM_JWT_SECRET"
